version: 1  # версия формата пакета

meta:
  author: "Ilya Burlakov"

filter:
  name:         "EAMU4-KuIMUXT2-BPFC4"
  f_start_mhz:  12695
  f_stop_mhz:   12755

paths:
  datasets_data: "datasets_data/phase_extractor_fine"
  origins_data: "origins_data"
  tune_data: "tune_data"
  saved_models: "saved_models/phase_extractor_fine"

dataset:
  matrix_sampler_delta:
    self_coupling: 0.7
    mainline_coupling: 0.1
    cross_coupling: 0.005
    parasitic_coupling: 0
    absolute: true  # true - absolute values, false - % from origin values
  pss_origin:
    a11: 0
    a22: 0
    b11: 0
    b22: 0
  pss_sampler_delta:
    a11: 1.57
    a22: 1.57
    b11: 3.54
    b22: 3.54
  sampler_type: "sobol"   # sobol, lhs, std
  size:
    train: 10000
    infer: 1000

train:
  max_epochs: 30

model:
