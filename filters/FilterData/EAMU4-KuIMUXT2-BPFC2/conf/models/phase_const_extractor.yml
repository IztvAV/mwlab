paths:
  datasets_data: "datasets_data/phase_const_extractor"
  saved_models: "saved_models/phase_const_extractor"

dataset:
  matrix_sampler_delta:
    self_coupling: 0.7
    mainline_coupling: 0.1
    cross_coupling: 0.005
    parasitic_coupling: 0
    absolute: true  # true - absolute values, false - % from origin values
  pss_sampler_delta:
    a11: 1.57
    a22: 1.57
    b11: 0.01
    b22: 0.01
  size:
    train: 10000
    infer: 1000

model:
  codec: "phase_const"
  checkpoint: "best-epoch=28-train_loss=0.10913-val_loss=0.09642-val_r2=0.99782-val_mse=0.00018-val_mae=0.00918-batch_size=32-train_dataset_size=10000-sampler=SamplerTypes.SAMPLER_SOBOL-cm_shifts=0.7;0.1;0.005-ps_origin=0;0;0;0-ps_shifts=1.57;1.57;0.01;0.01.ckpt"
