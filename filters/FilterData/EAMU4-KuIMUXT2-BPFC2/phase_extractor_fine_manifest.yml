version: 1  # версия формата пакета

meta:
  author: "Ilya Burlakov"

filter:
  name:         "EAMU4-KuIMUXT2-BPFC2"
  f_start_mhz:  11489.7
  f_stop_mhz:   11590.7

paths:
  datasets_data: "datasets_data/phase_extractor_fine"
  origins_data: "origins_data"
  tune_data: "tune_data"
  saved_models: "saved_models/phase_extractor_fine"

dataset:
  matrix_sampler_delta:
    self_coupling: 0.7
    mainline_coupling: 0.1
    cross_coupling: 0.005
    parasitic_coupling: 0
    absolute: true  # true - absolute values, false - % from origin values
  pss_origin:
    a11: 0
    a22: 0
    b11: 0
    b22: 0
  pss_sampler_delta:
    a11: 1.57
    a22: 1.57
    b11: 0.001
    b22: 0.001
  sampler_type: "sobol"   # sobol, lhs, std
  size:
    train: 10000
    infer: 1000

train:
  max_epochs: 30

model:
  checkpoint: "best-epoch=29-train_loss=0.10719-val_loss=0.09331-val_r2=0.99814-val_mse=0.00015-val_mae=0.00860-batch_size=32-train_dataset_size=10000-sampler=SamplerTypes.SAMPLER_SOBOL-cm_shifts=0.7;0.1;0.005-ps_origin=0;0;0;0-ps_shifts=1.57;1.57;0.001;0.001.ckpt"

inference:
  batch_size: 32
  device: "auto"            # можно "auto"
